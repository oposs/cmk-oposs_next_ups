[package]
# Package Information
name = oposs_next_ups
title = OPOSS NextUPS
author = Tobias Oetiker <tobi@oetiker.ch>
description = This check monitors NextUPS / Winner Pro / Voltronic UPS systems via SNMP.

    It tracks alarms, battery state, three-phase input/output/bypass electrical
    parameters, and battery health metrics across ~44 services.

# CheckMK Compatibility
version.min_required = 2.3.0p1
version.packaged = 2.3.0p34

# Optional
download_url = https://github.com/oposs/cmk-oposs_next_ups
version.usable_until =

# Build Options
validate_python = true
